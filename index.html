<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASIX Assurance</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
}

header {
    background: #0b2c5f;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

header img {
    height: 50px;
}

.hero {
    text-align: center;
    padding: 80px 20px;
    background: white;
}

.hero h1 {
    font-size: 36px;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #0b2c5f;
    color: white;
    text-decoration: none;
    border-radius: 6px;
}

.services {
    padding: 50px;
    text-align: center;
}

.card {
    display: inline-block;
    background: white;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

footer {
    background: #0b2c5f;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<header>
    <img src="asix_hd.png" alt="logo">
    <h2>ASIX Assurance</h2>
</header>

<section class="hero">
    <h1>Réduisez vos assurances jusqu'à -30%</h1>
    <p>Auto • Habitation • Santé • Pro</p>
    <a href="#" class="btn">Demander un devis</a>
</section>

<section class="services">
    <h2>Nos services</h2>

    <div class="card">🚗 Assurance Auto</div>
    <div class="card">🏠 Assurance Habitation</div>
    <div class="card">💼 Assurance Pro</div>
    <div class="card">❤️ Mutuelle Santé</div>
</section>

<footer>
    <p>contact@asixassurance.fr</p>
</footer>

</body>
</html>
