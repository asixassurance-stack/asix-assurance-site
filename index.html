<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASIX Assurance | Courtier indépendant en assurance</title>
  <meta name="description" content="ASIX Assurance, courtier indépendant en assurance auto, habitation, santé et professionnelle. Devis gratuit partout en France." />
  <style>
    :root{
      --blue:#0f2f63;
      --blue-dark:#081a35;
      --blue-light:#eaf2ff;
      --text:#0f172a;
      --muted:#475569;
      --line:#e2e8f0;
      --bg:#f8fafc;
      --white:#ffffff;
      --green:#25D366;
      --max:1180px;
      --shadow:0 14px 40px rgba(2,8,23,.10);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:var(--white);
      line-height:1.5;
    }
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    .container{width:min(var(--max), calc(100% - 32px));margin:0 auto}

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 22px;
      border-radius:14px;
      font-weight:700;
      transition:.2s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--white);color:var(--blue-dark)}
    .btn-dark{background:var(--blue);color:var(--white)}
    .btn-whatsapp{background:var(--green);color:#07361a}

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .topbar{
      min-height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand img{
      height:52px;
      width:auto;
    }
    .brand-text strong{
      display:block;
      color:var(--blue-dark);
      font-size:20px;
      line-height:1.1;
    }
    .brand-text span{
      display:block;
      color:var(--muted);
      font-size:13px;
      margin-top:2px;
    }
    nav{
      display:flex;
      gap:24px;
      align-items:center;
      flex-wrap:wrap;
    }
    nav a{
      font-weight:700;
      color:#334155;
    }

    .hero{
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, rgba(8,26,53,.96), rgba(15,47,99,.92));
      color:#fff;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      opacity:.18;
    }
    .hero-inner{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:36px;
      align-items:center;
      padding:78px 0 92px;
    }
    .pill{
      display:inline-block;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      font-size:14px;
      margin-bottom:18px;
    }
    .hero h1{
      margin:0;
      font-size:58px;
      line-height:1.02;
      letter-spacing:-1.5px;
      max-width:760px;
    }
    .hero p{
      margin:20px 0 0;
      color:#dbeafe;
      font-size:20px;
      max-width:720px;
    }
    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:28px;
    }
    .hero-proof{
      margin-top:14px;
      color:#dbeafe;
      font-size:14px;
    }
    .hero-card{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      border-radius:28px;
      padding:14px;
      box-shadow:var(--shadow);
    }
    .hero-card img{
      width:100%;
      height:500px;
      object-fit:cover;
      border-radius:22px;
    }

    .stats-wrap{
      margin-top:-28px;
      position:relative;
      z-index:2;
    }
    .stats{
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      padding:16px;
    }
    .stat{
      background:var(--bg);
      border-radius:18px;
      padding:22px;
    }
    .stat strong{
      display:block;
      color:var(--blue-dark);
      font-size:30px;
    }
    .stat span{
      color:var(--muted);
      font-size:15px;
    }

    section{padding:84px 0}
    .eyebrow{
      color:#1f5bb5;
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:13px;
      font-weight:800;
    }
    h2{
      margin:12px 0 0;
      font-size:44px;
      line-height:1.08;
      letter-spacing:-1px;
    }
    .lead{
      margin:16px 0 0;
      color:var(--muted);
      font-size:19px;
      max-width:860px;
    }

    .service-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:24px;
      margin-top:34px;
    }
    .service-card{
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
    }
    .service-card img{
      width:100%;
      height:210px;
      object-fit:cover;
    }
    .service-content{
      padding:22px;
    }
    .service-content h3{
      margin:0;
      color:var(--blue-dark);
      font-size:26px;
    }
    .service-content p{
      margin:12px 0 0;
      color:var(--muted);
    }

    .trust{
      background:var(--bg);
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
    }
    .trust-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
      margin-top:34px;
    }
    .trust-item{
      background:var(--white);
      border:1px solid var(--line);
      border-radius:22px;
      padding:22px;
      box-shadow:0 8px 24px rgba(15,23,42,.05);
      text-align:center;
      font-weight:700;
      color:var(--blue-dark);
    }

    .about-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:34px;
      align-items:center;
    }
    .about-images{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    .about-images img{
      height:270px;
      width:100%;
      object-fit:cover;
      border-radius:22px;
      box-shadow:0 8px 24px rgba(15,23,42,.08);
    }
    .about-images img:last-child{margin-top:32px}

    .check-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:24px;
    }
    .check{
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      color:#334155;
      font-weight:600;
    }

    .testimonial-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:22px;
      margin-top:34px;
    }
    .testimonial{
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:22px;
      padding:22px;
    }
    .stars{color:#f59e0b;font-size:20px}
    .testimonial p{color:#334155}
    .testimonial strong{display:block;margin-top:12px;color:var(--blue-dark)}

    .faq-list{
      display:grid;
      gap:14px;
      margin-top:34px;
    }
    details{
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px 20px;
    }
    summary{
      cursor:pointer;
      font-weight:800;
      font-size:19px;
    }
    details p{
      color:var(--muted);
      margin:12px 0 0;
    }

    .contact{
      background:linear-gradient(135deg, rgba(8,26,53,.96), rgba(31,91,181,.92));
      color:#fff;
    }
    .contact-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px;
      align-items:start;
    }
    .contact-box{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
